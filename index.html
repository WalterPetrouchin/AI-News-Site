<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distillr</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Soft cursor glow that follows the mouse -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <main class="home">
    <!-- Parallax wrapper — JS translates this based on mouse position -->
    <div class="home-parallax" id="homeParallax">

      <!-- Shrink wrapper — CSS animates this on load -->
      <div class="home-wordmark-wrap" id="wordmarkWrap">
        <h1 class="wordmark" aria-label="Distillr">
          <span class="word">
            <span class="l-d">D</span><span class="l-i">i</span><span class="l-s">s</span><span class="l-t">t</span><span class="l-i2">i</span><span class="l-l">l</span><span class="l-l2">l</span><span class="l-r">r</span>
          </span>
        </h1>
      </div>

      <div class="home-actions" id="homeActions">
        <a href="today.html" class="btn btn-primary">Read Today's News</a>
        <a href="archive.html" class="btn btn-secondary">See All News</a>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
